<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loan Analyzer</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React + ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Recharts -->
  <script src="https://unpkg.com/recharts/umd/Recharts.min.js"></script>
  <!-- Lucide Icons (UMD) -->
  <script src="https://unpkg.com/lucide/dist/lucide.js"></script>
</head>
<body class="bg-gray-100">
  <div id="root"></div>

  <script type="text/babel">
    const {
      useState,
      useMemo
    } = React;
    const {
      LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, Area, AreaChart
    } = Recharts;

    const LoanAnalyzer = () => {
      const [principal, setPrincipal] = useState(500);
      const [annualRate, setAnnualRate] = useState(9.6);
      const [months, setMonths] = useState(12);
      const [prepaymentMonth, setPrepaymentMonth] = useState(4);
      const [penaltyRate, setPenaltyRate] = useState(2);
      const [savingsRate, setSavingsRate] = useState(4.5);

      const calculations = useMemo(() => {
        const monthlyRate = annualRate / 100 / 12;
        const monthlyPayment = (principal * monthlyRate * Math.pow(1 + monthlyRate, months)) /
                              (Math.pow(1 + monthlyRate, months) - 1);

        let balance = principal;
        const schedule = [];
        let totalInterest = 0;
        let cumulativeInterest = 0;

        for (let month = 1; month <= months; month++) {
          const interestPayment = balance * monthlyRate;
          const principalPayment = monthlyPayment - interestPayment;
          cumulativeInterest += interestPayment;
          totalInterest += interestPayment;

          schedule.push({
            month,
            payment: monthlyPayment,
            principal: principalPayment,
            interest: interestPayment,
            balance: balance - principalPayment,
            cumulativeInterest,
            interestPercent: (cumulativeInterest / totalInterest) * 100
          });

          balance -= principalPayment;
        }

        // Prepayment analysis
        const prepaymentAnalysis = [];
        for (let month = 1; month <= months; month++) {
          const paidInterest = schedule.slice(0, month).reduce((sum, s) => sum + s.interest, 0);
          const remainingBalance = schedule[month - 1]?.balance || 0;
          const penaltyAmount = remainingBalance * (penaltyRate / 100);
          const remainingInterest = schedule.slice(month).reduce((sum, s) => sum + s.interest, 0);

          const savingsMonthlyRate = savingsRate / 100 / 12;
          const remainingMonths = months - month;
          const savingsInterest = remainingBalance * savingsMonthlyRate * remainingMonths;

          const netBenefit = remainingInterest - penaltyAmount - savingsInterest;

          prepaymentAnalysis.push({
            month,
            remainingBalance,
            penaltyAmount,
            remainingInterest,
            savingsInterest,
            netBenefit,
            totalSaved: remainingInterest - penaltyAmount
          });
        }

        const optimalMonth = prepaymentAnalysis.reduce((max, curr) =>
          curr.netBenefit > max.netBenefit ? curr : max
        );

        return {
          monthlyPayment,
          schedule,
          totalInterest,
          prepaymentAnalysis,
          optimalMonth
        };
      }, [principal, annualRate, months, prepaymentMonth, penaltyRate, savingsRate]);

      const formatCurrency = (value) => {
        return new Intl.NumberFormat('vi-VN').format(value.toFixed(0)) + ' tr';
      };

      const selectedPrepayment = calculations.prepaymentAnalysis[prepaymentMonth - 1];

      return (
        <div className="w-full max-w-7xl mx-auto p-6 bg-gradient-to-br from-blue-50 to-indigo-50">
          <h1 className="text-3xl font-bold text-gray-800 mb-4">Phân Tích Khoản Vay & Tối Ưu Hóa</h1>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div>
              <label>Số tiền vay (triệu VNĐ)</label>
              <input type="number" value={principal} onChange={e => setPrincipal(Number(e.target.value))}
                     className="w-full p-2 border rounded"/>
            </div>
            <div>
              <label>Lãi suất (%/năm)</label>
              <input type="number" value={annualRate} step="0.1" onChange={e => setAnnualRate(Number(e.target.value))}
                     className="w-full p-2 border rounded"/>
            </div>
            <div>
              <label>Thời hạn (tháng)</label>
              <input type="number" value={months} onChange={e => setMonths(Number(e.target.value))}
                     className="w-full p-2 border rounded"/>
            </div>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div>
              <label>Phí phạt trả trước (%)</label>
              <input type="number" value={penaltyRate} step="0.1" onChange={e => setPenaltyRate(Number(e.target.value))}
                     className="w-full p-2 border rounded"/>
            </div>
            <div>
              <label>Lãi tiết kiệm (%/năm)</label>
              <input type="number" value={savingsRate} step="0.1" onChange={e => setSavingsRate(Number(e.target.value))}
                     className="w-full p-2 border rounded"/>
            </div>
            <div>
              <label>Tháng trả trước hạn</label>
              <input type="number" min="1" max={months} value={prepaymentMonth} onChange={e => setPrepaymentMonth(Number(e.target.value))}
                     className="w-full p-2 border rounded"/>
            </div>
          </div>

          <div className="grid grid-cols-2 gap-6">
            <div className="bg-white p-4 rounded shadow">
              <h2 className="font-bold mb-2">Lãi suất tích lũy</h2>
              <ResponsiveContainer width="100%" height={200}>
                <AreaChart data={calculations.schedule}>
                  <CartesianGrid strokeDasharray="3 3" />
                  <XAxis dataKey="month"/>
                  <YAxis/>
                  <Tooltip formatter={val => val.toFixed(1) + "%"} />
                  <Area type="monotone" dataKey="interestPercent" stroke="#8b5cf6" fill="#a78bfa" />
                </AreaChart>
              </ResponsiveContainer>
            </div>
            <div className="bg-white p-4 rounded shadow">
              <h2 className="font-bold mb-2">Gốc vs Lãi hàng tháng</h2>
              <ResponsiveContainer width="100%" height={200}>
                <BarChart data={calculations.schedule}>
                  <CartesianGrid strokeDasharray="3 3"/>
                  <XAxis dataKey="month"/>
                  <YAxis/>
                  <Tooltip formatter={val => formatCurrency(val)}/>
                  <Legend />
                  <Bar dataKey="principal" stackId="a" fill="#10b981" name="Gốc"/>
                  <Bar dataKey="interest" stackId="a" fill="#ef4444" name="Lãi"/>
                </BarChart>
              </ResponsiveContainer>
            </div>
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<LoanAnalyzer />);
  </script>
</body>
</html>
