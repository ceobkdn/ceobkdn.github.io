<!DOCTYPE html>
<html>
<head>
    <title>Functional Tools</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .categories {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 40px;
            flex-wrap: wrap; /* để xuống hàng nếu màn hình nhỏ */
            margin-top: 30px;
        }
        .category {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            width: 250px;
        }
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            background-color: #007BFF;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s ease;
            width: 200px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Functional Tools</h1>

    <div class="categories">
        <!-- RF Tools -->
        <div class="category">
            <h2>RF Tools</h2>
            <div class="buttons" id="rf-buttons"></div>
        </div>

        <!-- Finance Tools -->
        <div class="category">
            <h2>Finance Tools</h2>
            <div class="buttons" id="finance-buttons"></div>
        </div>
    </div>

    <script>
        const rfLinks = [
            { name: 'TDR', url: 'https://ceobkdn.github.io/tdr.html' },
            { name: 'Diff Mismatch', url: 'https://ceobkdn.github.io/diffmis.html' },
            { name: 'Impedance Control', url: 'https://ceobkdn.github.io/impedanceControl.html' },
        ];

        const financeLinks = [
            { name: 'Loan', url: 'https://ceobkdn.github.io/fin_loan_opt.html' },
        ];

        const rfContainer = document.getElementById('rf-buttons');
        rfLinks.forEach(link => {
            const btn = document.createElement('button');
            btn.textContent = link.name;
            btn.onclick = () => window.open(link.url, '_blank');
            rfContainer.appendChild(btn);
        });

        const financeContainer = document.getElementById('finance-buttons');
        financeLinks.forEach(link => {
            const btn = document.createElement('button');
            btn.textContent = link.name;
            btn.onclick = () => window.open(link.url, '_blank');
            financeContainer.appendChild(btn);
        });
    </script>
</body>
</html>
